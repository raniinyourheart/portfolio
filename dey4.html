<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Competition - Lintang Maharani</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/certificates.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--navy-deep);
      color: var(--white);
      font-family: var(--font-body);
      min-height: 100vh;
      padding: 2rem;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--cyan);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      margin-bottom: 2rem;
      transition: all 0.3s;
    }
    .back-btn:hover {
      transform: translateX(-5px);
      color: var(--white);
    }
    .cert-section {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
    }
    .section-label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--cyan);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .section-label::before {
      content: '';
      width: 32px;
      height: 1px;
      background: var(--cyan);
    }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      margin-bottom: 1rem;
      color: var(--white);
    }
    .section-title span { color: var(--cyan); }
    .section-divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--cyan), transparent);
      margin-bottom: 3.5rem;
      border-radius: 2px;
    }
    .cert-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .cert-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(16px);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .cert-card:hover {
      transform: translateY(-8px);
      border-color: var(--cyan-dim);
      box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 30px rgba(0,255,235,0.08);
    }
    .cert-banner {
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .cert-banner-icon {
      font-size: 3rem;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 0 16px rgba(0,255,235,0.4));
    }
    .cert-banner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 60%, var(--navy-2));
    }
    .cert-body {
      padding: 1.4rem;
    }
    .cert-issuer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
    }
    .cert-issuer {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cyan);
    }
    .cert-year {
      font-family: var(--font-mono);
      font-size: 0.63rem;
      color: var(--silver-dim);
    }
    .cert-title {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }
    .cert-subtitle {
      font-size: 0.82rem;
      color: var(--silver-dim);
      margin-bottom: 1rem;
    }
    .cert-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cert-cat-badge {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      border-radius: 100px;
      background: rgba(0,255,235,0.1);
      border: 1px solid rgba(0,255,235,0.2);
      color: var(--cyan);
    }
    .cert-view-btn {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--cyan-dim);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .cert-card:hover .cert-view-btn { color: var(--cyan); }
    @media (max-width: 700px) {
      .cert-grid { grid-template-columns: 1fr; }
      .cert-section { padding: 1rem; }
    }
  </style>
</head>
<body>

<div class="cert-section">
  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali</a>
  
  <div class="section-label">🏆 Competition</div>
  <h2 class="section-title">Competition <span>Certificates</span></h2>
  <div class="section-divider"></div>

  <div class="cert-grid">
    <!-- Sertifikat 1 -->
    <div class="cert-card">
      <div class="cert-banner" style="background:linear-gradient(135deg,#1a0d30,#2a1060)">
        <span class="cert-banner-icon">🥈</span>
      </div>
      <div class="cert-body">
        <div class="cert-issuer-row">
          <span class="cert-issuer">Kominfo RI</span>
          <span class="cert-year">2024</span>
        </div>
        <div class="cert-title">Juara 2 – National IT Hackathon</div>
        <div class="cert-subtitle">Kompetisi Tingkat Nasional</div>
        <div class="cert-footer">
          <span class="cert-cat-badge">Competition</span>
          <span class="cert-view-btn">Detail →</span>
        </div>
      </div>
    </div>

    <!-- Sertifikat 2 -->
    <div class="cert-card">
      <div class="cert-banner" style="background:linear-gradient(135deg,#0d2218,#1a4a2e)">
        <span class="cert-banner-icon">🏅</span>
      </div>
      <div class="cert-body">
        <div class="cert-issuer-row">
          <span class="cert-issuer">Universitas</span>
          <span class="cert-year">2024</span>
        </div>
        <div class="cert-title">Best Innovation Award</div>
        <div class="cert-subtitle">PBL Competition</div>
        <div class="cert-footer">
          <span class="cert-cat-badge">Competition</span>
          <span class="cert-view-btn">Detail →</span>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
